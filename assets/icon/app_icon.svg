<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512"
xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Fondo turquesa profundo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12D6C5"/>
      <stop offset="50%" stop-color="#008A94"/>
      <stop offset="100%" stop-color="#004E57"/>
    </linearGradient>

    <!-- Blanco porcelana realista -->
    <radialGradient id="toothGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F4FEFF"/>
      <stop offset="100%" stop-color="#D9F7FA"/>
    </radialGradient>

    <!-- Sombra interna suave -->
    <radialGradient id="innerShade" cx="50%" cy="75%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Dorado metálico fino -->
    <linearGradient id="goldFine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF6C2"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFF2A6"/>
    </linearGradient>

    <!-- Sombra exterior elegante -->
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18"
      flood-color="#002E33" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fondo con bordes redondeados modernos -->
  <rect x="30" y="30" width="452" height="452"
        rx="120"
        fill="url(#bgGrad)"/>

  <!-- Marco dorado fino -->
  <rect x="55" y="55" width="402" height="402"
        rx="105"
        fill="none"
        stroke="url(#goldFine)"
        stroke-width="6"/>

  <!-- Muela anatómica -->
  <g filter="url(#softShadow)">
    <path d="M256 145
             C210 115, 160 160, 175 225
             C190 295, 225 355, 245 385
             C255 398, 270 395, 270 360
             C270 395, 285 398, 295 385
             C315 355, 350 295, 365 225
             C380 160, 330 115, 284 145
             C275 150, 265 155, 256 145Z"
          fill="url(#toothGrad)"/>
  </g>

  <!-- Sombra interna inferior -->
  <ellipse cx="256" cy="340" rx="90" ry="40"
           fill="url(#innerShade)"/>

</svg>
